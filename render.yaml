databases:
  - name: atlas-postgres
    databaseName: atlas
    user: atlas

services:
  - type: web
    name: atlas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh ./start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-postgres
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN_REGEX
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "none"
      - key: REQUIREMENT_GENERATION_PROVIDER
        value: "mock"
      - key: REQUIREMENT_GENERATION_FALLBACK_TO_MOCK
        value: "true"
      - key: AUTH_DEFAULT_USERNAME
        value: "demo"
      - key: AUTH_DEFAULT_PASSWORD
        value: "demo1234"
      - key: AUTH_DEFAULT_DISPLAY_NAME
        value: "Demo Engineer"

  - type: static
    name: atlas-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
